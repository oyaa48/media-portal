{% extends "jellyfin/base.html" %}

{% block title %}
{{ item.Name }}
{% endblock %}

{% block content %}

<img src="{{ JELLYFIN_URL }}/Items/{{ item.Id }}/Images/Primary?api_key={{ api_key }}" alt="{{ item.Name }}"
  style="max-width: 200px;">

<h1>{{ item.Name }}</h1>

<video controls width="800">
  <source src="{{ JELLYFIN_URL }}/Videos/{{ item.Id }}/stream.mp4?Static=true&api_key={{ api_key }}">
</video>

<p>Year: {{ item.ProductionYear }}</p>

<p>Type: {{ item.Type }}</p>

{% endblock %}
