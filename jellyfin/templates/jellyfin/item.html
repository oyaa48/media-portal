{% extends "jellyfin/base.html" %}

{% block title %}
{{ item.Name }}
{% endblock %}

{% block content %}

<h1>{{ item.Name }}</h1>

<video controls width="800">
  <source src="{{ JELLYFIN_URL }}/Videos/{{ item.Id }}/stream.mp4?Static=true&api_key={{ api_key }}">
</video>

<details>
  <summary>Description</summary>
  <p>{{ item.Overview }}</p>
  <p>Year: {{ item.ProductionYear }}</p>
  <p>Type: {{ item.Type }}</p>

</details>

{% endblock %}
